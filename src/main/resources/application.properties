spring:
  application:
    name: FluxyPay
    description: High-Performance Payment Processor
    version: 0.0.1-SNAPSHOT

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fluxypay}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  # Redis Configuration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    database: 0
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 10
      compression-type: snappy
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: fluxypay-consumer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      session-timeout-ms: 30000
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      ack-mode: manual_immediate
      concurrency: 5
      poll-timeout: 3000

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:8080}

# Management & Monitoring
management:
  server:
    port: 9090
    servlet:
      context-path: /
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:dev}
    distribution:
      percentiles-histogram:
        payment.processing.duration: true
        webhook.delivery.duration: true

# Application-Specific Configuration
app:
  name: FluxyPay
  
  # Security
  jwt:
    secret: ${JWT_SECRET:your_super_secret_jwt_key_change_in_production}
    expiration: 86400000  # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days
    issuer: fluxypay
    audience: fluxypay-api

  # Idempotency
  idempotency:
    token-expiry-minutes: 1440  # 24 hours
    enable-strict-validation: true

  # Webhook Configuration
  webhook:
    timeout-ms: ${WEBHOOK_TIMEOUT:30000}
    retry-attempts: ${WEBHOOK_RETRY_ATTEMPTS:5}
    retry-backoff-ms: ${WEBHOOK_RETRY_BACKOFF:500}
    retry-backoff-multiplier: 2.0
    max-retry-delay-ms: 300000  # 5 minutes
    enable-signature-verification: true
    signature-algorithm: SHA256
    batch-size: 100
    batch-interval-sec: 30

  # Rate Limiting
  rate-limit:
    enabled: true
    per-client:
      requests-per-minute: 1000
      requests-per-hour: 50000
    per-ip:
      requests-per-minute: 500
      requests-per-hour: 10000

  # Payment Configuration
  payment:
    default-currency: USD
    supported-currencies:
      - USD
      - EUR
      - INR
      - GBP
    min-amount: 100  # cents
    max-amount: 999999999  # cents
    timeout-seconds: 300
    enable-3d-secure: true

  # Network Configuration
  payment-network:
    visa:
      enabled: true
      timeout-ms: 30000
      retry-count: 2
    mastercard:
      enabled: true
      timeout-ms: 30000
      retry-count: 2
    upi:
      enabled: true
      timeout-ms: 60000
      retry-count: 3

  # Cache Configuration
  cache:
    default-ttl-seconds: 3600
    transaction-ttl-seconds: 86400
    token-ttl-seconds: 86400

  # Encryption
  encryption:
    algorithm: AES
    key-size: 256
    transformation: AES/CBC/PKCS5Padding
    secret-key: ${ENCRYPTION_SECRET_KEY:your_32_char_encryption_key_minimum!!}

  # Kafka Topics
  kafka:
    topics:
      payments-initiated: payments.initiated
      payments-completed: payments.completed
      payments-failed: payments.failed
      webhooks-queue: webhooks.queue
      refunds-initiated: refunds.initiated
      transactions-reconciliation: transactions.reconciliation
    consumer-groups:
      payment-processor: payment-processor-group
      webhook-processor: webhook-processor-group
      reconciliation-processor: reconciliation-processor-group

# Logging Configuration
logging:
  level:
    root: INFO
    com.payment.PaymentGateway: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fluxypay.log
    max-size: 100MB
    max-history: 30

# Server Configuration
server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    connection-timeout: 60000ms

# Springdoc OpenAPI (Swagger)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

